<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0d13">
<title>MarketMap — Inteligência Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #0b0d13;
    color: #f1f5f9;
    height: 100vh;
    overflow: hidden;
  }

  /* Tela de Login */
  .screen {
    display: none;
    width: 100%;
    height: 100vh;
  }

  .screen.active {
    display: flex;
  }

  #screen-login {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%), #0b0d13;
  }

  .login-box {
    width: 100%;
    max-width: 420px;
    padding: 2rem;
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: #3b82f6;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
  }

  .logo-text span { color: #3b82f6; }
  .logo-sub { font-size: 12px; color: #64748b; }

  .field-label {
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .field-input {
    width: 100%;
    background: #111520;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 11px 14px;
    color: #f1f5f9;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }

  .field-input:focus { border-color: #3b82f6; }
  .field-group { margin-bottom: 1rem; }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #94a3b8;
    cursor: pointer;
  }

  .btn-sm:hover { background: #1f2840; color: #f1f5f9; }
  .login-err { color: #ef4444; font-size: 13px; margin-top: 0.5rem; display: none; }

  /* App Layout */
  #screen-app {
    flex-direction: column;
    height: 100vh;
  }

  .topbar {
    height: 56px;
    background: #111520;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .topbar-logo {
    font-weight: 700;
    font-size: 16px;
    margin-right: auto;
  }
  .topbar-logo span { color: #3b82f6; }
  .topbar-user { font-size: 13px; color: #94a3b8; }

  .btn-icon {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #94a3b8;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-icon:hover { background: #1a2035; color: #f1f5f9; }

  .tabs-row {
    display: flex;
    background: #111520;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 0 1rem;
    gap: 0;
    flex-shrink: 0;
  }

  .tab-btn {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
  }
  .tab-btn.active { color: #60a5fa; border-bottom-color: #3b82f6; }

  .tab-content {
    display: none;
    flex: 1;
    overflow: hidden;
  }
  .tab-content.active { display: flex; flex-direction: column; }

  /* Mapa - Layout corrigido */
  .map-wrap {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .map-container {
    flex: 1;
    position: relative;
  }

  #google-map {
    width: 100%;
    height: 100%;
  }

  .map-sidebar {
    width: 380px;
    background: #111520;
    border-left: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .sidebar-title { font-size: 14px; font-weight: 600; }
  .sidebar-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

  .search-bar {
    padding: 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .search-row { display: flex; gap: 0.5rem; }
  .search-input {
    flex: 1;
    background: #0b0d13;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 12px;
    color: #f1f5f9;
    font-size: 13px;
  }
  .btn-search {
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .search-type {
    display: flex;
    gap: 1rem;
    font-size: 12px;
  }
  .search-type label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

  .map-controls {
    padding: 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .company-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }

  .company-card {
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
  }
  .company-card:hover { background: #1f2840; }
  .company-card.mapped { border-left: 3px solid #22c55e; }
  .company-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .company-addr { font-size: 11px; color: #64748b; }
  .company-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-system { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .tag-counter { background: rgba(168,85,247,0.15); color: #a855f7; }
  .tag-status { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tag-none { background: #1f2840; color: #64748b; }

  .map-legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0.75rem;
    z-index: 10;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.green { background: #22c55e; }
  .legend-dot.red { background: #ef4444; }
  .legend-dot.blue { background: #3b82f6; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    width: 90%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .modal-footer {
    padding: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
  }
  .btn-secondary {
    padding: 10px 16px;
    background: #1f2840;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #94a3b8;
    cursor: pointer;
  }
  .btn-accent {
    padding: 10px 16px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  /* Relatórios */
  .reports-container {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .reports-filters {
    background: #1a2035;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: flex-end;
  }
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 140px;
  }
  .filter-group label { font-size: 10px; color: #64748b; }
  .filter-select {
    background: #111520;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 12px;
    color: #f1f5f9;
    font-size: 13px;
  }
  .reports-content {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
  }
  .report-card {
    background: #1a2035;
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .report-header {
    background: #1f2840;
    padding: 0.75rem 1rem;
    font-weight: 600;
    font-size: 14px;
  }
  .report-body { padding: 1rem; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
  }
  .stat-item {
    text-align: center;
    padding: 0.75rem;
    background: #111520;
    border-radius: 8px;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: #60a5fa; }
  .stat-label-sm { font-size: 11px; color: #64748b; }
  .progress-bar {
    height: 6px;
    background: #111520;
    border-radius: 3px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-fill {
    height: 100%;
    background: #22c55e;
    border-radius: 3px;
  }

  .notif {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1a2035;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 20px;
    display: none;
    z-index: 2000;
  }
  .notif.show { display: block; }
  .notif.success { border-left: 3px solid #22c55e; }
  .notif.error { border-left: 3px solid #ef4444; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">📍</div>
      <div><div class="logo-text">Market<span>Map</span></div><div class="logo-sub">Inteligência Comercial</div></div>
    </div>
    <div class="field-group">
      <div class="field-label">🔑 Chave Google Maps API</div>
      <input type="text" id="login-apikey" class="field-input" placeholder="AIzaSy...">
    </div>
    <div class="field-group"><div class="field-label">📧 E-mail</div><input type="email" id="login-email" class="field-input"></div>
    <div class="field-group"><div class="field-label">🔒 Senha</div><input type="password" id="login-pass" class="field-input"></div>
    <div class="field-group">
      <div class="field-label" style="color:#60a5fa">⚙️ Configurar usuário:</div>
      <div style="display:flex;gap:8px"><input type="text" id="setup-email" placeholder="Novo e-mail" class="field-input" style="flex:1"><input type="password" id="setup-pass" placeholder="Nova senha" class="field-input" style="flex:1"><button class="btn-sm" onclick="setupCredentials()" style="background:#22c55e;color:#fff">Salvar</button></div>
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="screen-app" class="screen">
  <div class="topbar">
    <div class="topbar-logo">Market<span>Map</span></div>
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-icon" onclick="doLogout()">🚪 Sair</button>
    <button class="btn-icon" onclick="clearAllData()">🗑 Limpar</button>
  </div>

  <div class="tabs-row">
    <button class="tab-btn active" onclick="switchTab('map',this)">🗺 Mapa</button>
    <button class="tab-btn" onclick="switchTab('market',this)">📈 Market Share</button>
    <button class="tab-btn" onclick="switchTab('reports',this)">📊 Relatórios</button>
    <button class="tab-btn" onclick="switchTab('segment',this)">🏷 Segmentos</button>
  </div>

  <div class="tab-content active" id="map-tab">
    <div class="map-wrap">
      <div class="map-container"><div id="google-map"></div><div class="map-legend"><div class="legend-item"><div class="legend-dot green"></div> Cliente</div><div class="legend-item"><div class="legend-dot blue"></div> Prospect</div><div class="legend-item"><div class="legend-dot red"></div> Concorrente</div></div></div>
      <div class="map-sidebar">
        <div class="sidebar-header"><div class="sidebar-title">🔍 Buscar</div><div class="sidebar-sub">Cidade, rua ou nome da empresa</div></div>
        <div class="search-bar">
          <div class="search-type"><label><input type="radio" name="searchType" value="location" checked> 📍 Por local</label><label><input type="radio" name="searchType" value="company"> 🏢 Por nome</label></div>
          <div class="search-row"><input type="text" id="search-input" class="search-input" placeholder="Ex: São Paulo, Av. Paulista"><button class="btn-search" onclick="searchBusinesses()">Buscar</button></div>
          <div class="search-row"><input type="text" id="company-name-input" class="search-input" placeholder="Ex: Google" style="display:none"></div>
        </div>
        <div class="map-controls">
          <button class="btn-sm active" onclick="filterByStatus('',this)">Todas</button>
          <button class="btn-sm" onclick="filterByStatus('prospect',this)">Prospect</button>
          <button class="btn-sm" onclick="filterByStatus('contacted',this)">Contatado</button>
          <button class="btn-sm" onclick="filterByStatus('interested',this)">Interessado</button>
          <button class="btn-sm" onclick="filterByStatus('customer',this)">Cliente</button>
          <button class="btn-sm" onclick="filterByStatus('competitor',this)">Concorrente</button>
        </div>
        <div class="company-list" id="company-list"><div style="padding:1rem;color:#64748b;text-align:center">Faça login e busque empresas</div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="market-tab"><div style="padding:1.5rem;overflow-y:auto;height:100%"><div id="market-stats"></div></div></div>
  <div class="tab-content" id="reports-tab"><div class="reports-container"><div class="reports-filters"><div class="filter-group"><label>Estado</label><select id="filter-state" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Cidade</label><select id="filter-city" class="filter-select"><option value="">Todas</option></select></div><div class="filter-group"><label>Sistema</label><select id="filter-software" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Contador</label><select id="filter-counter" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Status</label><select id="filter-status-report" class="filter-select"><option value="">Todos</option><option value="customer">Clientes</option><option value="competitor">Concorrentes</option></select></div><button class="btn-sm" onclick="applyReportsFilter()" style="background:#3b82f6;color:#fff">Aplicar</button><button class="btn-sm" onclick="resetReportsFilter()">Limpar</button><button class="btn-sm" onclick="exportReports()" style="background:#22c55e;color:#fff">Exportar CSV</button></div><div class="reports-content" id="reports-content"></div></div></div>
  <div class="tab-content" id="segment-tab"><div style="padding:1.5rem;overflow-y:auto;height:100%"><div id="segment-list"></div></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">📌 Empresa</div><button class="modal-close" onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button></div><div class="modal-body"><div class="field-group"><div class="field-label">Nome</div><input type="text" id="modal-company-name" class="field-input" readonly></div><div class="field-group"><div class="field-label">Endereço</div><input type="text" id="modal-company-addr" class="field-input" readonly></div><div class="field-group"><div class="field-label">⚙️ Sistema</div><input type="text" id="modal-system" class="field-input" placeholder="Ex: SAP, Omie"></div><div class="field-group"><div class="field-label">👥 Contador</div><input type="text" id="modal-counter" class="field-input" placeholder="Nome da contabilidade"></div><div class="field-group"><div class="field-label">Classificação</div><select id="modal-status" class="field-input"><option value="prospect">Prospect</option><option value="contacted">Contatado</option><option value="interested">Interessado</option><option value="customer">✅ Cliente</option><option value="competitor">⚠️ Concorrente</option></select></div><div class="field-group" id="competitor-field" style="display:none"><div class="field-label">Concorrente</div><input type="text" id="modal-competitor" class="field-input" placeholder="Nome do concorrente"></div></div><div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-accent" onclick="saveCompany()">Salvar</button></div></div></div>

<div class="notif" id="notif"></div>

<script>
let map, geocoder, currentMarkers = [], currentPlace = null, companies = [], apiKey = '', searchResults = [], currentFilter = '', sessionToken = null;
let currentReportsFilter = { state: '', city: '', software: '', counter: '', status: '' };
let validCredentials = { email: 'admin@marketmap.com', password: 'admin123' };

// Estados brasileiros
const stateNames = { 'SP':'São Paulo','RJ':'Rio de Janeiro','MG':'Minas Gerais','RS':'Rio Grande do Sul','PR':'Paraná','SC':'Santa Catarina','BA':'Bahia','PE':'Pernambuco','CE':'Ceará','DF':'Distrito Federal','GO':'Goiás','MT':'Mato Grosso','MS':'Mato Grosso do Sul','ES':'Espírito Santo','PA':'Pará','AM':'Amazonas','MA':'Maranhão','PB':'Paraíba','RN':'Rio Grande do Norte','AL':'Alagoas','SE':'Sergipe','PI':'Piauí','TO':'Tocantins','RO':'Rondônia','AC':'Acre','AP':'Amapá','RR':'Roraima' };

function loadCredentials() { const saved = localStorage.getItem('mm_credentials'); if(saved) validCredentials = JSON.parse(saved); else localStorage.setItem('mm_credentials', JSON.stringify(validCredentials)); }
function setupCredentials() { const email = document.getElementById('setup-email').value.trim(), pass = document.getElementById('setup-pass').value.trim(); if(!email || !pass){ showNotif('Preencha e-mail e senha','error'); return; } validCredentials = { email, password: pass }; localStorage.setItem('mm_credentials', JSON.stringify(validCredentials)); showNotif('✅ Credenciais salvas!','success'); document.getElementById('setup-email').value = ''; document.getElementById('setup-pass').value = ''; }
function loadData() { const saved = localStorage.getItem('mm_companies'); if(saved) companies = JSON.parse(saved); }
function saveCompanies() { localStorage.setItem('mm_companies', JSON.stringify(companies)); updateAllReports(); }

function doLogin() {
  const apikey = document.getElementById('login-apikey').value.trim(), email = document.getElementById('login-email').value.trim(), pass = document.getElementById('login-pass').value.trim();
  const errDiv = document.getElementById('login-err');
  if(!apikey || !email || !pass){ errDiv.innerHTML = '❌ Preencha todos os campos'; errDiv.style.display='block'; return; }
  if(!apikey.startsWith('AIza')){ errDiv.innerHTML = '❌ Chave inválida'; errDiv.style.display='block'; return; }
  if(email !== validCredentials.email || pass !== validCredentials.password){ errDiv.innerHTML = '❌ E-mail ou senha inválidos'; errDiv.style.display='block'; return; }
  
  localStorage.setItem('mm_gkey', apikey); localStorage.setItem('mm_user', email); localStorage.setItem('mm_logged', 'true'); apiKey = apikey;
  loadGoogleMaps();
}

function loadGoogleMaps() {
  const oldScript = document.querySelector('script[src*="maps.googleapis.com"]'); if(oldScript) oldScript.remove();
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&callback=initMap&loading=async`;
  script.async = true; script.defer = true;
  script.onerror = () => { showNotif('Erro ao carregar Google Maps','error'); document.getElementById('login-btn').innerHTML='Entrar'; document.getElementById('login-btn').disabled=false; };
  document.head.appendChild(script);
  showNotif('Carregando mapa...','info');
}

function initMap() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('topbar-user').textContent = localStorage.getItem('mm_user');
  
  map = new google.maps.Map(document.getElementById('google-map'), { zoom: 12, center: { lat: -23.5505, lng: -46.6333 }, mapId: 'DEMO_MAP_ID', mapTypeControl: true, fullscreenControl: true, streetViewControl: false });
  geocoder = new google.maps.Geocoder();
  loadData(); loadCompaniesOnMap(); updateAllReports(); setupEventListeners();
  showNotif('✅ Mapa carregado! Faça uma busca.','success');
}

function updateAllReports() { updateMarketShare(); updateSegments(); updateReportsFilters(); generateReports(); }

function updateMarketShare() {
  const div = document.getElementById('market-stats'); if(!div) return;
  const total = companies.length, clients = companies.filter(c=>c.status==='customer').length, prospects = companies.filter(c=>['prospect','contacted','interested'].includes(c.status)).length, competitors = companies.filter(c=>c.status==='competitor').length;

function updateSegments() {
  const div = document.getElementById('segment-list'); if(!div) return;
  if(companies.length===0){ div.innerHTML='<p style="color:#64748b">Nenhuma empresa mapeada</p>'; return; }
  const bySystem={}, byCounter={};
  companies.forEach(c=>{ if(c.system){ if(!bySystem[c.system]) bySystem[c.system]=[]; bySystem[c.system].push(c); } if(c.counter){ if(!byCounter[c.counter]) byCounter[c.counter]=[]; byCounter[c.counter].push(c); } });
  let html='<div class="report-card"><div class="report-header">⚙️ Por Sistema</div><div class="report-body">';
  for(let [sys,comps] of Object.entries(bySystem).sort((a,b)=>b[1].length-a[1].length)){ let clients=comps.filter(c=>c.status==='customer').length; html+=`<div style="margin-bottom:10px"><strong>${sys}</strong><br><span style="font-size:12px;color:#64748b">Total: ${comps.length} | Clientes: ${clients}</span><div class="progress-bar"><div class="progress-fill" style="width:${comps.length>0?(clients/comps.length*100):0}%;height:4px"></div></div></div>`; }
  html+=`</div></div><div class="report-card"><div class="report-header">👥 Por Contador</div><div class="report-body">`;
  for(let [cnt,comps] of Object.entries(byCounter).sort((a,b)=>b[1].length-a[1].length)){ html+=`<div style="margin-bottom:8px"><strong>${cnt}</strong><br><span style="font-size:11px;color:#64748b">${comps.length} empresa(s)</span></div>`; }

function extractState(address) { if(!address) return 'N/I'; const match = address.match(/([A-Z]{2})(?=\s|$|,)/); if(match && stateNames[match[1]]) return match[1]; for(const [uf,nome] of Object.entries(stateNames)) if(address.toLowerCase().includes(nome.toLowerCase())) return uf; return 'N/I'; }
function extractCity(address) { if(!address) return 'N/I'; const match = address.match(/([A-Za-zÀ-ÖØ-öø-ÿ\s]+?)\s*-\s*[A-Z]{2}/); if(match) return match[1].trim(); const parts = address.split(','); if(parts.length>=2) return parts[0].trim().substring(0,30); return 'N/I'; }

function updateReportsFilters() {
  const cities=new Set(), states=new Set(), softwares=new Set(), counters=new Set();
  companies.forEach(c=>{ let state=extractState(c.address); if(state!=='N/I') states.add(state); let city=extractCity(c.address); if(city!=='N/I') cities.add(city); if(c.system) softwares.add(c.system); if(c.counter) counters.add(c.counter); });
  const sSel=document.getElementById('filter-state'); if(sSel){ sSel.innerHTML='<option value="">Todos</option>'+Array.from(states).sort().map(s=>`<option value="${s}">${s} - ${stateNames[s]||s}</option>`).join(''); }
  const cSel=document.getElementById('filter-city'); if(cSel){ cSel.innerHTML='<option value="">Todas</option>'+Array.from(cities).sort().map(c=>`<option value="${c}">${c}</option>`).join(''); }
  const swSel=document.getElementById('filter-software'); if(swSel){ swSel.innerHTML='<option value="">Todos</option>'+Array.from(softwares).sort().map(s=>`<option value="${s}">${s}</option>`).join(''); }
  const cntSel=document.getElementById('filter-counter'); if(cntSel){ cntSel.innerHTML='<option value="">Todos</option>'+Array.from(counters).sort().map(c=>`<option value="${c}">${c}</option>`).join(''); }
}
