<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0d13">
<title>MarketMap — Inteligência Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: #0b0d13; color: #f1f5f9; height: 100vh; overflow: hidden; }
  .screen { display: none; width: 100%; height: 100vh; }
  .screen.active { display: flex; }
  #screen-login { align-items: center; justify-content: center; background: #0b0d13; }
  .login-box { width: 100%; max-width: 420px; padding: 2rem; background: #1a2035; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
  .logo-icon { width: 40px; height: 40px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo-text { font-size: 22px; font-weight: 700; }
  .logo-text span { color: #3b82f6; }
  .logo-sub { font-size: 12px; color: #64748b; }
  .field-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; font-weight: 500; }
  .field-input { width: 100%; background: #111520; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 11px 14px; color: #f1f5f9; font-size: 14px; font-family: inherit; outline: none; }
  .field-input:focus { border-color: #3b82f6; }
  .field-group { margin-bottom: 1rem; }
  .btn-primary { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 10px; font-size: 12px; background: #1a2035; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #94a3b8; cursor: pointer; }
  .btn-sm:hover { background: #1f2840; color: #f1f5f9; }
  .login-err { color: #ef4444; font-size: 13px; margin-top: 0.5rem; display: none; }
  #screen-app { flex-direction: column; height: 100vh; }
  .topbar { height: 56px; background: #111520; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; padding: 0 1rem; gap: 0.75rem; flex-shrink: 0; }
  .topbar-logo { font-weight: 700; font-size: 16px; margin-right: auto; }
  .topbar-logo span { color: #3b82f6; }
  .topbar-user { font-size: 13px; color: #94a3b8; }
  .btn-icon { background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #94a3b8; padding: 6px 10px; cursor: pointer; font-size: 13px; }
  .btn-icon:hover { background: #1a2035; color: #f1f5f9; }
  .tabs-row { display: flex; background: #111520; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 1rem; gap: 0; flex-shrink: 0; }
  .tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 500; color: #64748b; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
  .tab-btn.active { color: #60a5fa; border-bottom-color: #3b82f6; }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }
  .map-wrap { display: flex; flex: 1; min-height: 0; }
  .map-container { flex: 1; position: relative; }
  #google-map { width: 100%; height: 100%; }
  .map-sidebar { width: 380px; background: #111520; border-left: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .sidebar-title { font-size: 14px; font-weight: 600; }
  .sidebar-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
  .search-bar { padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; gap: 0.5rem; }
  .search-row { display: flex; gap: 0.5rem; }
  .search-input { flex: 1; background: #0b0d13; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 8px 12px; color: #f1f5f9; font-size: 13px; }
  .btn-search { background: #3b82f6; border: none; border-radius: 10px; padding: 8px 16px; color: #fff; font-weight: 600; cursor: pointer; }
  .search-type { display: flex; gap: 1rem; font-size: 12px; }
  .search-type label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .map-controls { padding: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .company-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
  .company-card { background: #1a2035; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; }
  .company-card:hover { background: #1f2840; }
  .company-card.mapped { border-left: 3px solid #22c55e; }
  .company-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .company-addr { font-size: 11px; color: #64748b; }
  .company-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .tag-system { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .tag-counter { background: rgba(168,85,247,0.15); color: #a855f7; }
  .tag-status { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tag-none { background: #1f2840; color: #64748b; }
  .map-legend { position: absolute; bottom: 20px; left: 20px; background: #1a2035; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 0.75rem; z-index: 10; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.green { background: #22c55e; }
  .legend-dot.red { background: #ef4444; }
  .legend-dot.blue { background: #3b82f6; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a2035; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
  .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .modal-footer { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); display: flex; gap: 0.75rem; justify-content: flex-end; }
  .btn-secondary { padding: 10px 16px; background: #1f2840; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #94a3b8; cursor: pointer; }
  .btn-accent { padding: 10px 16px; background: #3b82f6; border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; }
  .reports-container { display: flex; flex-direction: column; height: 100%; }
  .reports-filters { background: #1a2035; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
  .filter-group label { font-size: 10px; color: #64748b; }
  .filter-select { background: #111520; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 12px; color: #f1f5f9; font-size: 13px; }
  .reports-content { flex: 1; overflow-y: auto; padding: 1rem; }
  .report-card { background: #1a2035; border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
  .report-header { background: #1f2840; padding: 0.75rem 1rem; font-weight: 600; font-size: 14px; }
  .report-body { padding: 1rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
  .stat-item { text-align: center; padding: 0.75rem; background: #111520; border-radius: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #60a5fa; }
  .stat-label-sm { font-size: 11px; color: #64748b; }
  .progress-bar { height: 6px; background: #111520; border-radius: 3px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; background: #22c55e; border-radius: 3px; }
  .notif { position: fixed; bottom: 20px; right: 20px; background: #1a2035; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 20px; display: none; z-index: 2000; }
  .notif.show { display: block; }
  .notif.success { border-left: 3px solid #22c55e; }
  .notif.error { border-left: 3px solid #ef4444; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">📍</div>
      <div><div class="logo-text">Market<span>Map</span></div><div class="logo-sub">Inteligência Comercial</div></div>
    </div>
    <div class="field-group">
      <div class="field-label">🔑 Chave Google Maps API</div>
      <input type="text" id="login-apikey" class="field-input" placeholder="AIzaSy...">
    </div>
    <div class="field-group"><div class="field-label">📧 E-mail</div><input type="email" id="login-email" class="field-input" value="admin@marketmap.com"></div>
    <div class="field-group"><div class="field-label">🔒 Senha</div><input type="password" id="login-pass" class="field-input" value="admin123"></div>
    <div class="field-group">
      <div class="field-label" style="color:#60a5fa">⚙️ Alterar usuário/senha:</div>
      <div style="display:flex;gap:8px"><input type="text" id="setup-email" placeholder="Novo e-mail" class="field-input" style="flex:1"><input type="password" id="setup-pass" placeholder="Nova senha" class="field-input" style="flex:1"><button class="btn-sm" onclick="setupCredentials()" style="background:#22c55e;color:#fff">Salvar</button></div>
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="screen-app" class="screen">
  <div class="topbar">
    <div class="topbar-logo">Market<span>Map</span></div>
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-icon" onclick="doLogout()">🚪 Sair</button>
    <button class="btn-icon" onclick="clearAllData()">🗑 Limpar</button>
  </div>

  <div class="tabs-row">
    <button class="tab-btn active" onclick="switchTab('map',this)">🗺 Mapa</button>
    <button class="tab-btn" onclick="switchTab('market',this)">📈 Market Share</button>
    <button class="tab-btn" onclick="switchTab('reports',this)">📊 Relatórios</button>
    <button class="tab-btn" onclick="switchTab('segment',this)">🏷 Segmentos</button>
  </div>

  <div class="tab-content active" id="map-tab">
    <div class="map-wrap">
      <div class="map-container"><div id="google-map"></div><div class="map-legend"><div class="legend-item"><div class="legend-dot green"></div> Cliente</div><div class="legend-item"><div class="legend-dot blue"></div> Prospect</div><div class="legend-item"><div class="legend-dot red"></div> Concorrente</div></div></div>
      <div class="map-sidebar">
        <div class="sidebar-header"><div class="sidebar-title">🔍 Buscar</div><div class="sidebar-sub">Cidade, rua ou nome da empresa</div></div>
        <div class="search-bar">
          <div class="search-type"><label><input type="radio" name="searchType" value="location" checked> 📍 Por local</label><label><input type="radio" name="searchType" value="company"> 🏢 Por nome</label></div>
          <div class="search-row"><input type="text" id="search-input" class="search-input" placeholder="Ex: São Paulo, Av. Paulista"><button class="btn-search" onclick="searchBusinesses()">Buscar</button></div>
          <div class="search-row"><input type="text" id="company-name-input" class="search-input" placeholder="Ex: Google" style="display:none"></div>
        </div>
        <div class="map-controls">
          <button class="btn-sm active" onclick="filterByStatus('',this)">Todas</button>
          <button class="btn-sm" onclick="filterByStatus('prospect',this)">Prospect</button>
          <button class="btn-sm" onclick="filterByStatus('contacted',this)">Contatado</button>
          <button class="btn-sm" onclick="filterByStatus('interested',this)">Interessado</button>
          <button class="btn-sm" onclick="filterByStatus('customer',this)">Cliente</button>
          <button class="btn-sm" onclick="filterByStatus('competitor',this)">Concorrente</button>
        </div>
        <div class="company-list" id="company-list"><div style="padding:1rem;color:#64748b;text-align:center">Faça login e busque empresas</div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="market-tab"><div style="padding:1.5rem;overflow-y:auto;height:100%"><div id="market-stats"></div></div></div>
  <div class="tab-content" id="reports-tab"><div class="reports-container"><div class="reports-filters"><div class="filter-group"><label>Estado</label><select id="filter-state" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Cidade</label><select id="filter-city" class="filter-select"><option value="">Todas</option></select></div><div class="filter-group"><label>Sistema</label><select id="filter-software" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Contador</label><select id="filter-counter" class="filter-select"><option value="">Todos</option></select></div><div class="filter-group"><label>Status</label><select id="filter-status-report" class="filter-select"><option value="">Todos</option><option value="customer">Clientes</option><option value="competitor">Concorrentes</option></select></div><button class="btn-sm" onclick="applyReportsFilter()" style="background:#3b82f6;color:#fff">Aplicar</button><button class="btn-sm" onclick="resetReportsFilter()">Limpar</button><button class="btn-sm" onclick="exportReports()" style="background:#22c55e;color:#fff">Exportar CSV</button></div><div class="reports-content" id="reports-content"></div></div></div>
  <div class="tab-content" id="segment-tab"><div style="padding:1.5rem;overflow-y:auto;height:100%"><div id="segment-list"></div></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">📌 Empresa</div><button class="modal-close" onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button></div><div class="modal-body"><div class="field-group"><div class="field-label">Nome</div><input type="text" id="modal-company-name" class="field-input" readonly></div><div class="field-group"><div class="field-label">Endereço</div><input type="text" id="modal-company-addr" class="field-input" readonly></div><div class="field-group"><div class="field-label">⚙️ Sistema</div><input type="text" id="modal-system" class="field-input" placeholder="Ex: SAP, Omie"></div><div class="field-group"><div class="field-label">👥 Contador</div><input type="text" id="modal-counter" class="field-input" placeholder="Nome da contabilidade"></div><div class="field-group"><div class="field-label">Classificação</div><select id="modal-status" class="field-input"><option value="prospect">Prospect</option><option value="contacted">Contatado</option><option value="interested">Interessado</option><option value="customer">✅ Cliente</option><option value="competitor">⚠️ Concorrente</option></select></div><div class="field-group" id="competitor-field" style="display:none"><div class="field-label">Concorrente</div><input type="text" id="modal-competitor" class="field-input" placeholder="Nome do concorrente"></div></div><div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-accent" onclick="saveCompany()">Salvar</button></div></div></div>

<div class="notif" id="notif"></div>

<script>
// ==================== VARIÁVEIS GLOBAIS ====================
let map, geocoder, currentMarkers = [], currentPlace = null, companies = [], searchResults = [], currentFilter = '';
let currentReportsFilter = { state: '', city: '', software: '', counter: '', status: '' };
let validCredentials = { email: 'admin@marketmap.com', password: 'admin123' };

// Estados brasileiros
const stateNames = { 'SP':'São Paulo','RJ':'Rio de Janeiro','MG':'Minas Gerais','RS':'Rio Grande do Sul','PR':'Paraná','SC':'Santa Catarina','BA':'Bahia','PE':'Pernambuco','CE':'Ceará','DF':'Distrito Federal','GO':'Goiás','MT':'Mato Grosso','MS':'Mato Grosso do Sul','ES':'Espírito Santo','PA':'Pará','AM':'Amazonas','MA':'Maranhão','PB':'Paraíba','RN':'Rio Grande do Norte','AL':'Alagoas','SE':'Sergipe','PI':'Piauí','TO':'Tocantins','RO':'Rondônia','AC':'Acre','AP':'Amapá','RR':'Roraima' };

// ==================== CREDENCIAIS ====================
function loadCredentials() { 
  const saved = localStorage.getItem('mm_credentials'); 
  if(saved) validCredentials = JSON.parse(saved); 
  else localStorage.setItem('mm_credentials', JSON.stringify(validCredentials)); 
}

function setupCredentials() { 
  const email = document.getElementById('setup-email').value.trim(), pass = document.getElementById('setup-pass').value.trim(); 
  if(!email || !pass){ showNotif('Preencha e-mail e senha','error'); return; } 
  validCredentials = { email, password: pass }; 
  localStorage.setItem('mm_credentials', JSON.stringify(validCredentials)); 
  showNotif('✅ Credenciais salvas! Use-as para login','success'); 
  document.getElementById('setup-email').value = ''; 
  document.getElementById('setup-pass').value = ''; 
}

// ==================== LOGIN ====================
function doLogin() {
  const apikey = document.getElementById('login-apikey').value.trim();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errDiv = document.getElementById('login-err');
  const loginBtn = document.getElementById('login-btn');
  
  errDiv.style.display = 'none';
  
  if(!apikey || !email || !pass){
    errDiv.innerHTML = '❌ Preencha todos os campos';
    errDiv.style.display = 'block';
    return;
  }
  
  if(!apikey.startsWith('AIza')){
    errDiv.innerHTML = '❌ Chave inválida. Deve começar com AIza';
    errDiv.style.display = 'block';
    return;
  }
  
  if(email !== validCredentials.email || pass !== validCredentials.password){
    errDiv.innerHTML = '❌ E-mail ou senha inválidos';
    errDiv.style.display = 'block';
    return;
  }
  
  // Salvar chave e usuário
  localStorage.setItem('mm_gkey', apikey);
  localStorage.setItem('mm_user', email);
  localStorage.setItem('mm_logged', 'true');
  
  // Mostrar loading
  loginBtn.innerHTML = 'Entrando...';
  loginBtn.disabled = true;
  
  // Carregar Google Maps
  loadGoogleMaps(apikey);
}

function loadGoogleMaps(apiKey) {
  // Remove script antigo se existir
  const oldScript = document.querySelector('script[src*="maps.googleapis.com"]');
  if(oldScript) oldScript.remove();
  
  // Criar função global de callback
  window.initMapCallback = function() {
    initMap();
  };
  
  // Carregar novo script
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&callback=initMapCallback`;
  script.async = true;
  script.defer = true;
  script.onerror = function() {
    document.getElementById('login-btn').innerHTML = 'Entrar';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-err').innerHTML = '❌ Erro ao carregar Google Maps. Verifique sua chave.';
    document.getElementById('login-err').style.display = 'block';
    showNotif('Erro ao carregar Google Maps','error');
  };
  document.head.appendChild(script);
  
  showNotif('Carregando mapa...','info');
}

function initMap() {
  // Restaurar botão login
  document.getElementById('login-btn').innerHTML = 'Entrar';
  document.getElementById('login-btn').disabled = false;
  
  // Trocar telas
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('topbar-user').textContent = localStorage.getItem('mm_user');
  
  // Inicializar mapa
  map = new google.maps.Map(document.getElementById('google-map'), { 
    zoom: 12, 
    center: { lat: -23.5505, lng: -46.6333 }, 
    mapTypeControl: true, 
    fullscreenControl: true, 
    streetViewControl: false 
  });
  
  geocoder = new google.maps.Geocoder();
  
  // Carregar dados
  loadData();
  loadCompaniesOnMap();
  updateAllReports();
  setupEventListeners();
  
  showNotif('✅ Login realizado! Faça uma busca para começar.','success');
}

// ==================== DADOS ====================
function loadData() { 
  const saved = localStorage.getItem('mm_companies'); 
  if(saved) companies = JSON.parse(saved); 
  console.log('Empresas carregadas:', companies.length);
}

function saveCompanies() { 
  localStorage.setItem('mm_companies', JSON.stringify(companies)); 
  updateAllReports(); 
  showNotif('✅ Dados salvos!','success'); 
}

function clearAllData() { 
  if(confirm('Limpar todos os dados? Isso não pode ser desfeito.')){ 
    companies = []; 
    localStorage.removeItem('mm_companies'); 
    saveCompanies(); 
    loadCompaniesOnMap(); 
    showNotif('Todos os dados foram limpos','info'); 
  } 
}

// ==================== UTILITÁRIOS ====================
function extractState(address) { 
  if(!address) return 'N/I'; 
  const match = address.match(/([A-Z]{2})(?=\s|$|,)/); 
  if(match && stateNames[match[1]]) return match[1]; 
  for(const [uf,nome] of Object.entries(stateNames)) 
    if(address.toLowerCase().includes(nome.toLowerCase())) return uf; 
  return 'N/I'; 
}

function extractCity(address) { 
  if(!address) return 'N/I'; 
  const match = address.match(/([A-Za-zÀ-ÖØ-öø-ÿ\s]+?)\s*-\s*[A-Z]{2}/); 
  if(match) return match[1].trim(); 
  const parts = address.split(','); 
  if(parts.length>=2) return parts[0].trim().substring(0,30); 
  return 'N/I'; 
}

function updateAllReports() { 
  updateMarketShare(); 
  updateSegments(); 
  updateReportsFilters(); 
  generateReports(); 
}

// ==================== MARKET SHARE ====================
function updateMarketShare() {
  const div = document.getElementById('market-stats'); 
  if(!div) return;
  
  const total = companies.length;
  const clients = companies.filter(c=>c.status==='customer').length;
  const prospects = companies.filter(c=>['prospect','contacted','interested'].includes(c.status)).length;
  const competitors = companies.filter(c=>c.status==='competitor').length;
  const marketShare = total>0?((clients/total)*100).toFixed(1):0;
  const winRate = (clients+prospects)>0?((clients/(clients+prospects))*100).toFixed(1):0;
  
  const stateData = {};
  const systemData = {};
  const competitorMap = {};
  
  companies.forEach(c=>{ 
    let state = extractState(c.address); 
    if(state && state!=='N/I'){ 
      if(!stateData[state]) stateData[state]={total:0,clients:0}; 
      stateData[state].total++; 
      if(c.status==='customer') stateData[state].clients++; 
    } 
    if(c.system){ 
      if(!systemData[c.system]) systemData[c.system]={total:0,clients:0}; 
      systemData[c.system].total++; 
      if(c.status==='customer') systemData[c.system].clients++; 
    } 
    if(c.status==='competitor' && c.competitorName) 
      competitorMap[c.competitorName]=(competitorMap[c.competitorName]||0)+1; 
  });
  
  let html = `<div class="stats-grid">
    <div class="stat-item"><div class="stat-value">${marketShare}%</div><div class="stat-label-sm">Market Share</div><div class="progress-bar"><div class="progress-fill" style="width:${marketShare}%"></div></div></div>
    <div class="stat-item"><div class="stat-value">${winRate}%</div><div class="stat-label-sm">Conversão</div><div class="progress-bar"><div class="progress-fill" style="width:${winRate}%;background:#3b82f6"></div></div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-item"><div class="stat-value">${clients}</div><div class="stat-label-sm">✅ Clientes</div></div>
    <div class="stat-item"><div class="stat-value">${prospects}</div><div class="stat-label-sm">📌 Potenciais</div></div>
    <div class="stat-item"><div class="stat-value">${competitors}</div><div class="stat-label-sm">⚠️ Concorrentes</div></div>
    <div class="stat-item"><div class="stat-value">${total}</div><div class="stat-label-sm">🏢 Total</div></div>
  </div>`;
  
  if(Object.keys(stateData).length){
    html += `<div class="report-card"><div class="report-header">📍 Por Estado</div><div class="report-body">`;
    for(let [st,data] of Object.entries(stateData).sort((a,b)=>b[1].clients-a[1].clients).slice(0,5)){
      let share = data.total>0?((data.clients/data.total)*100).toFixed(1):0;
      html += `<div><div style="display:flex;justify-content:space-between"><span>${st}</span><span>${share}% (${data.clients}/${data.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${share}%;background:#22c55e"></div></div></div>`;
    }
    html += `</div></div>`;
  }
  
  if(Object.keys(systemData).length){
    html += `<div class="report-card"><div class="report-header">⚙️ Por Sistema</div><div class="report-body">`;
    for(let [sys,data] of Object.entries(systemData).sort((a,b)=>b[1].clients-a[1].clients).slice(0,5)){
      let share = data.total>0?((data.clients/data.total)*100).toFixed(1):0;
      html += `<div><div style="display:flex;justify-content:space-between"><span>${sys}</span><span>${share}% (${data.clients}/${data.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${share}%;background:#3b82f6"></div></div></div>`;
    }
    html += `</div></div>`;
  }
  
  div.innerHTML = html;
}

// ==================== SEGMENTOS ====================
function updateSegments() {
  const div = document.getElementById('segment-list'); 
  if(!div) return;
  if(companies.length===0){ div.innerHTML='<p style="color:#64748b">Nenhuma empresa mapeada</p>'; return; }
  
  const bySystem={}, byCounter={};
  companies.forEach(c=>{ 
    if(c.system){ if(!bySystem[c.system]) bySystem[c.system]=[]; bySystem[c.system].push(c); } 
    if(c.counter){ if(!byCounter[c.counter]) byCounter[c.counter]=[]; byCounter[c.counter].push(c); } 
  });
  
  let html = '<div class="report-card"><div class="report-header">⚙️ Por Sistema</div><div class="report-body">';
  for(let [sys,comps] of Object.entries(bySystem).sort((a,b)=>b[1].length-a[1].length)){
    let clients = comps.filter(c=>c.status==='customer').length;
    let share = comps.length>0?((clients/comps.length)*100).toFixed(1):0;
    html += `<div style="margin-bottom:10px"><strong>${sys}</strong><br><span style="font-size:12px;color:#64748b">Total: ${comps.length} | Clientes: ${clients} (${share}%)</span><div class="progress-bar"><div class="progress-fill" style="width:${share}%;height:4px"></div></div></div>`;
  }
  html += `</div></div><div class="report-card"><div class="report-header">👥 Por Contador</div><div class="report-body">`;
  for(let [cnt,comps] of Object.entries(byCounter).sort((a,b)=>b[1].length-a[1].length)){
    html += `<div style="margin-bottom:8px"><strong>${cnt}</strong><br><span style="font-size:11px;color:#64748b">${comps.length} empresa(s)</span></div>`;
  }
  html += `</div></div>`;
  div.innerHTML = html;
}

// ==================== RELATÓRIOS ====================
function updateReportsFilters() {
  const cities=new Set(), states=new Set(), softwares=new Set(), counters=new Set();
  companies.forEach(c=>{ 
    let state=extractState(c.address); if(state!=='N/I') states.add(state); 
    let city=extractCity(c.address); if(city!=='N/I') cities.add(city); 
    if(c.system) softwares.add(c.system); 
    if(c.counter) counters.add(c.counter); 
  });
  
  const sSel=document.getElementById('filter-state'); 
  if(sSel){ sSel.innerHTML='<option value="">Todos</option>'+Array.from(states).sort().map(s=>`<option value="${s}">${s} - ${stateNames[s]||s}</option>`).join(''); }
  const cSel=document.getElementById('filter-city'); 
  if(cSel){ cSel.innerHTML='<option value="">Todas</option>'+Array.from(cities).sort().map(c=>`<option value="${c}">${c}</option>`).join(''); }
  const swSel=document.getElementById('filter-software'); 
  if(swSel){ swSel.innerHTML='<option value="">Todos</option>'+Array.from(softwares).sort().map(s=>`<option value="${s}">${s}</option>`).join(''); }
  const cntSel=document.getElementById('filter-counter'); 
  if(cntSel){ cntSel.innerHTML='<option value="">Todos</option>'+Array.from(counters).sort().map(c=>`<option value="${c}">${c}</option>`).join(''); }
}

function applyReportsFilter() { 
  currentReportsFilter = { 
    state: document.getElementById('filter-state')?.value||'', 
    city: document.getElementById('filter-city')?.value||'', 
    software: document.getElementById('filter-software')?.value||'', 
    counter: document.getElementById('filter-counter')?.value||'', 
    status: document.getElementById('filter-status-report')?.value||'' 
  }; 
  generateReports(); 
}

function resetReportsFilter() { 
  ['filter-state','filter-city','filter-software','filter-counter','filter-status-report'].forEach(id=>{ 
    let el=document.getElementById(id); if(el) el.value=''; 
  }); 
  applyReportsFilter(); 
}

function generateReports() {
  const container = document.getElementById('reports-content'); 
  if(!container) return;
  
  let filtered = companies.filter(c=>{ 
    let state=extractState(c.address), city=extractCity(c.address); 
    if(currentReportsFilter.state && state!==currentReportsFilter.state) return false; 
    if(currentReportsFilter.city && city!==currentReportsFilter.city) return false; 
    if(currentReportsFilter.software && c.system!==currentReportsFilter.software) return false; 
    if(currentReportsFilter.counter && c.counter!==currentReportsFilter.counter) return false; 
    if(currentReportsFilter.status && c.status!==currentReportsFilter.status) return false; 
    return true; 
  });
  
  if(filtered.length===0){ 
    container.innerHTML='<p style="color:#64748b;text-align:center">Nenhuma empresa encontrada</p>'; 
    return; 
  }
  
  const total=filtered.length, clients=filtered.filter(c=>c.status==='customer').length, prospects=filtered.filter(c=>['prospect','contacted','interested'].includes(c.status)).length, competitors=filtered.filter(c=>c.status==='competitor').length, marketShare=total>0?((clients/total)*100).toFixed(1):0;
  const stateData={}, systemData={}, counterData={};
  
  filtered.forEach(c=>{ 
    let state=extractState(c.address); 
    if(state!=='N/I'){ 
      if(!stateData[state]) stateData[state]={total:0,clients:0}; 
      stateData[state].total++; 
      if(c.status==='customer') stateData[state].clients++; 
    } 
    if(c.system){ 
      if(!systemData[c.system]) systemData[c.system]={total:0,clients:0}; 
      systemData[c.system].total++; 
      if(c.status==='customer') systemData[c.system].clients++; 
    } 
    if(c.counter){ 
      if(!counterData[c.counter]) counterData[c.counter]={total:0,clients:0}; 
      counterData[c.counter].total++; 
      if(c.status==='customer') counterData[c.counter].clients++; 
    } 
  });
  
  let html = `<div class="report-card"><div class="report-header">📊 Resumo</div><div class="report-body"><div class="stats-grid">
    <div class="stat-item"><div class="stat-value">${clients}</div><div class="stat-label-sm">Clientes</div></div>
    <div class="stat-item"><div class="stat-value">${prospects}</div><div class="stat-label-sm">Potenciais</div></div>
    <div class="stat-item"><div class="stat-value">${competitors}</div><div class="stat-label-sm">Concorrentes</div></div>
    <div class="stat-item"><div class="stat-value">${marketShare}%</div><div class="stat-label-sm">Market Share</div></div>
  </div></div></div>`;
  
  if(Object.keys(stateData).length){
    html += `<div class="report-card"><div class="report-header">🗺️ Por Estado</div><div class="report-body">`;
    for(let [st,data] of Object.entries(stateData).sort((a,b)=>b[1].clients-a[1].clients)){
      let share = data.total>0?((data.clients/data.total)*100).toFixed(1):0;
      html += `<div><div style="display:flex;justify-content:space-between"><span>${st}</span><span>${share}% (${data.clients}/${data.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${share}%;background:#22c55e"></div></div></div>`;
    }
    html += `</div></div>`;
  }
  
  if(Object.keys(systemData).length){
    html += `<div class="report-card"><div class="report-header">⚙️ Por Sistema</div><div class="report-body">`;
    for(let [sys,data] of Object.entries(systemData).sort((a,b)=>b[1].clients-a[1].clients)){
      let share = data.total>0?((data.clients/data.total)*100).toFixed(1):0;
      html += `<div><div style="display:flex;justify-content:space-between"><span>${sys}</span><span>${share}% (${data.clients}/${data.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${share}%;background:#3b82f6"></div></div></div>`;
    }
    html += `</div></div>`;
  }
  
  if(Object.keys(counterData).length){
    html += `<div class="report-card"><div class="report-header">👥 Por Contador</div><div class="report-body">`;
    for(let [cnt,data] of Object.entries(counterData).sort((a,b)=>b[1].clients-a[1].clients)){
      let share = data.total>0?((data.clients/data.total)*100).toFixed(1):0;
      html += `<div><div style="display:flex;justify-content:space-between"><span>${cnt}</span><span>${share}% (${data.clients}/${data.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${share}%;background:#a855f7"></div></div></div>`;
    }
    html += `</div></div>`;
  }
  
  container.innerHTML = html;
}

function exportReports() {
  let filtered = companies.filter(c=>{ 
    let state=extractState(c.address), city=extractCity(c.address); 
    if(currentReportsFilter.state && state!==currentReportsFilter.state) return false; 
    if(currentReportsFilter.city && city!==currentReportsFilter.city) return false; 
    if(currentReportsFilter.software && c.system!==currentReportsFilter.software) return false; 
    if(currentReportsFilter.counter && c.counter!==currentReportsFilter.counter) return false; 
    if(currentReportsFilter.status && c.status!==currentReportsFilter.status) return false; 
    return true; 
  });
  
  if(filtered.length===0){ showNotif('Nenhuma empresa para exportar','error'); return; }
  
  const headers = ['Nome','Endereço','Estado','Cidade','Sistema','Contador','Status','Concorrente'];
  const rows = filtered.map(c=>[`"${c.name}"`,`"${c.address}"`,`"${extractState(c.address)}"`,`"${extractCity(c.address)}"`,`"${c.system||''}"`,`"${c.counter||''}"`,`"${c.status}"`,`"${c.competitorName||''}"`]);
  const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv],{type:'text/csv;charset=utf-8'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `marketmap_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  link.click();
  URL.revokeObjectURL(link.url);
  showNotif(`✅ Exportado ${filtered.length} empresas`,'success');
}

// ==================== BUSCA EMPRESAS ====================
function searchBusinesses() {
  const searchType = document.querySelector('input[name="searchType"]:checked').value;
  let query = searchType==='location' ? document.getElementById('search-input').value.trim() : document.getElementById('company-name-input').value.trim();
  
  if(!query){ showNotif('Digite o que deseja buscar','error'); return; }
  
  clearMarkers();
  showNotif('Buscando...','info');
  
  if(searchType==='company'){
    const service = new google.maps.places.PlacesService(map);
    service.textSearch({query:query, fields:['name','formatted_address','geometry','place_id'], language:'pt-BR'}, (res,status)=>{
      if(status==='OK' && res && res.length){ 
        searchResults = res; 
        displayBusinesses(res); 
        if(res[0].geometry) map.setCenter(res[0].geometry.location); 
        map.setZoom(16); 
        showNotif(`✅ ${res.length} empresa(s) encontrada(s)`,'success'); 
      } else { 
        showNotif(`❌ Nenhuma empresa encontrada`,'error'); 
        document.getElementById('company-list').innerHTML='<div style="padding:1rem;color:#64748b;text-align:center">Nenhuma empresa encontrada</div>'; 
      }
    });
  } else {
    geocoder.geocode({address:query+', Brasil'}, (res,status)=>{
      if(status==='OK' && res[0]){ 
        let loc = res[0].geometry.location; 
        map.setCenter(loc); 
        map.setZoom(15);
        const service = new google.maps.places.PlacesService(map);
        service.nearbySearch({location:loc, radius:2000, type:'establishment', language:'pt-BR'}, (res2,status2)=>{ 
          if(status2==='OK' && res2.length){ 
            searchResults = res2; 
            displayBusinesses(res2); 
            showNotif(`✅ ${res2.length} empresas encontradas`,'success'); 
          } else { 
            showNotif(`❌ Nenhuma empresa encontrada`,'error'); 
          }
        });
      } else { 
        showNotif(`❌ Local não encontrado`,'error'); 
      }
    });
  }
}

function displayBusinesses(results) {
  const list = document.getElementById('company-list');
  list.innerHTML = '';
  
  results.forEach(place => {
    if(!place.place_id) return;
    
    const card = document.createElement('div');
    card.className = 'company-card';
    card.setAttribute('data-place-id', place.place_id);
    
    const existing = companies.find(c=>c.placeId===place.place_id);
    if(existing) card.classList.add('mapped');
    
    let statusTag = '';
    if(existing){
      const labels = { 'prospect':'📌 Prospect','contacted':'📞 Contatado','interested':'⭐ Interessado','customer':'✅ Cliente','competitor':'⚠️ Concorrente' };
      statusTag = `<span class="tag tag-status">${labels[existing.status]||existing.status}</span>`;
      if(existing.system) statusTag += `<span class="tag tag-system">⚙️ ${existing.system}</span>`;
      if(existing.counter) statusTag += `<span class="tag tag-counter">📋 ${existing.counter}</span>`;
    } else { 
      statusTag = '<span class="tag tag-none">➕ Clique para adicionar</span>'; 
    }
    
    card.innerHTML = `<div class="company-name">${place.name||'Sem nome'}</div><div class="company-addr">${place.formatted_address||place.vicinity||'Endereço'}</div><div class="company-tags">${statusTag}</div>`;
    card.onclick = ()=>openCompanyModal(place);
    list.appendChild(card);
    
    if(place.geometry && place.geometry.location){
      let markerColor = existing ? (existing.status==='customer'?'#22c55e':(existing.status==='competitor'?'#ef4444':'#3b82f6')) : '#ef4444';
      const marker = new google.maps.Marker({ 
        position: place.geometry.location, 
        map: map, 
        title: place.name, 
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: markerColor, fillOpacity: 1, strokeWeight: 0, scale: 8 } 
      });
      marker.addListener('click',()=>openCompanyModal(place));
      currentMarkers.push(marker);
    }
  });
}

// ==================== MODAL EMPRESA ====================
function openCompanyModal(place) {
  currentPlace = place;
  const existing = companies.find(c=>c.placeId===place.place_id);
  
  document.getElementById('modal-company-name').value = place.name||'';
  document.getElementById('modal-company-addr').value = place.formatted_address||place.vicinity||'Endereço';
  document.getElementById('modal-system').value = existing ? (existing.system||'') : '';
  document.getElementById('modal-counter').value = existing ? (existing.counter||'') : '';
  document.getElementById('modal-status').value = existing ? (existing.status||'prospect') : 'prospect';
  document.getElementById('modal-competitor').value = existing ? (existing.competitorName||'') : '';
  document.getElementById('competitor-field').style.display = (document.getElementById('modal-status').value==='competitor')?'block':'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { 
  document.getElementById('modal-overlay').classList.remove('open'); 
  currentPlace = null; 
}

function saveCompany() {
  if(!currentPlace) return;
  
  const system = document.getElementById('modal-system').value.trim();
  const counter = document.getElementById('modal-counter').value.trim();
  const status = document.getElementById('modal-status').value;
  const competitorName = document.getElementById('modal-competitor').value.trim();
  
  if(!system || !counter){ showNotif('Preencha sistema e contador','error'); return; }
  if(status==='competitor' && !competitorName){ showNotif('Informe o concorrente','error'); return; }
  
  const company = { 
    placeId: currentPlace.place_id, 
    name: currentPlace.name||'Sem nome', 
    address: currentPlace.formatted_address||currentPlace.vicinity||'Endereço', 
    lat: currentPlace.geometry?.location.lat()||0, 
    lng: currentPlace.geometry?.location.lng()||0, 
    system, counter, status, 
    competitorName: status==='competitor'?competitorName:null, 
    timestamp: new Date().toISOString() 
  };
  
  const idx = companies.findIndex(c=>c.placeId===company.placeId);
  if(idx>=0) companies[idx]=company; 
  else companies.push(company);
  
  saveCompanies(); 
  closeModal();
  if(searchResults.length) displayBusinesses(searchResults);
  loadCompaniesOnMap();
}

function loadCompaniesOnMap() {
  clearMarkers();
  
  companies.forEach(comp => {
    if(comp.lat && comp.lng){
      let markerColor = comp.status==='customer'?'#22c55e':(comp.status==='competitor'?'#ef4444':'#3b82f6');
      const marker = new google.maps.Marker({ 
        position: {lat:comp.lat, lng:comp.lng}, 
        map: map, 
        title: comp.name, 
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: markerColor, fillOpacity: 1, strokeWeight: 0, scale: 8 } 
      });
      marker.addListener('click',()=>{ 
        openCompanyModal({ 
          place_id: comp.placeId, 
          name: comp.name, 
          formatted_address: comp.address, 
          vicinity: comp.address, 
          geometry: { location: { lat: ()=>comp.lat, lng: ()=>comp.lng } } 
        }); 
      });
      currentMarkers.push(marker);
    }
  });
}

function clearMarkers() { 
  currentMarkers.forEach(m=>{ if(m && m.setMap) m.setMap(null); }); 
  currentMarkers = []; 
}

function filterByStatus(status,btn){ 
  currentFilter = status; 
  document.querySelectorAll('.map-controls .btn-sm').forEach(b=>b.classList.remove('active')); 
  if(btn) btn.classList.add('active'); 
  document.querySelectorAll('#company-list .company-card').forEach(card=>{ 
    if(!status) card.style.display='block'; 
    else{ 
      let placeId = card.getAttribute('data-place-id'); 
      let comp = companies.find(c=>c.placeId===placeId); 
      card.style.display = (comp && comp.status===status)?'block':'none'; 
    } 
  }); 
}

function switchTab(tab,btn){ 
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); 
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); 
  btn.classList.add('active'); 
  document.getElementById(tab+'-tab').classList.add('active'); 
  if(tab==='market'||tab==='segment'||tab==='reports') updateAllReports(); 
}

function doLogout() {
  localStorage.removeItem('mm_logged');
  companies = [];
  searchResults = [];
  currentMarkers = [];
  if(map) clearMarkers();
  
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-email').value = 'admin@marketmap.com';
  document.getElementById('login-pass').value = 'admin123';
  document.getElementById('login-apikey').value = '';
  
  showNotif('Logout realizado','info');
}

function setupEventListeners(){
  document.getElementById('modal-status')?.addEventListener('change',function(){ 
    document.getElementById('competitor-field').style.display = this.value==='competitor'?'block':'none'; 
  });
  
  let rloc = document.querySelector('input[value="location"]');
  let rcomp = document.querySelector('input[value="company"]');
  let sinp = document.getElementById('search-input');
  let cinp = document.getElementById('company-name-input');
  
  if(rloc && rcomp){ 
    rloc.onchange = ()=>{ sinp.style.display='block'; cinp.style.display='none'; }; 
    rcomp.onchange = ()=>{ sinp.style.display='none'; cinp.style.display='block'; }; 
  }
  
  document.getElementById('search-input')?.addEventListener('keypress',e=>{ if(e.key==='Enter') searchBusinesses(); });
  document.getElementById('company-name-input')?.addEventListener('keypress',e=>{ if(e.key==='Enter') searchBusinesses(); });
}

function showNotif(msg,type){ 
  let n = document.getElementById('notif'); 
  n.textContent = msg; 
  n.className = `notif show ${type}`; 
  setTimeout(()=>n.classList.remove('show'),3000); 
}

// ==================== INICIALIZAÇÃO ====================
loadCredentials();
setupEventListeners();

if (localStorage.getItem('mm_logged') === 'true') {
  const savedKey = localStorage.getItem('mm_gkey');
  const savedUser = localStorage.getItem('mm_user');
  if (savedKey && savedUser) {
    document.getElementById('login-apikey').value = savedKey;
    document.getElementById('login-email').value = savedUser;
    doLogin();
  }
}
