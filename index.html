<script>
// ========== VARIÁVEIS GLOBAIS ==========
let map, geocoder, markers = [], companiesList = [], currentPlace = null, currentFilter = 'all';
let currentUser = null, currentUserRole = 'consultor';
let placesService = null;

// Estados brasileiros
const stateNames = {
  'SP':'São Paulo','RJ':'Rio de Janeiro','MG':'Minas Gerais','RS':'Rio Grande do Sul','PR':'Paraná','SC':'Santa Catarina',
  'BA':'Bahia','PE':'Pernambuco','CE':'Ceará','DF':'Distrito Federal','GO':'Goiás','MT':'Mato Grosso','MS':'Mato Grosso do Sul',
  'ES':'Espírito Santo','PA':'Pará','AM':'Amazonas','MA':'Maranhão','PB':'Paraíba','RN':'Rio Grande do Norte','AL':'Alagoas',
  'SE':'Sergipe','PI':'Piauí','TO':'Tocantins','RO':'Rondônia','AC':'Acre','AP':'Amapá','RR':'Roraima'
};

function showNotif(msg, type) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = `notif show ${type}`;
  setTimeout(() => n.classList.remove('show'), 3000);
}

// ========== LOGIN ==========
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errDiv = document.getElementById('login-err');
  
  if (!email || !pass) {
    errDiv.innerHTML = 'Preencha e-mail e senha';
    errDiv.style.display = 'block';
    return;
  }
  
  try {
    const userCred = await window.signInWithEmailAndPassword(window.auth, email, pass);
    currentUser = userCred.user;
    
    const userDoc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid));
    if (userDoc.exists()) {
      currentUserRole = userDoc.data().role || 'consultor';
    } else {
      await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { email: currentUser.email, role: 'consultor' });
      currentUserRole = 'consultor';
    }
    
    document.getElementById('role-badge').textContent = currentUserRole.toUpperCase();
    
    if (currentUserRole === 'diretor') {
      document.getElementById('admin-tab-btn').style.display = 'block';
      loadAdminPanel();
    }
    
    await loadCompaniesFromFirestore();
    loadGoogleMaps();
    
  } catch (error) {
    errDiv.innerHTML = 'Erro: ' + error.message;
    errDiv.style.display = 'block';
  }
}

function loadGoogleMaps() {
  const apiKey = localStorage.getItem('mm_gkey');
  if (!apiKey) {
    const key = prompt('Digite sua chave da Google Maps API:');
    if (key && key.startsWith('AIza')) {
      localStorage.setItem('mm_gkey', key);
      loadGoogleMapsScript(key);
    } else {
      showNotif('Chave inválida', 'error');
    }
  } else {
    loadGoogleMapsScript(apiKey);
  }
}

function loadGoogleMapsScript(apiKey) {
  const oldScript = document.querySelector('script[src*="maps.googleapis.com"]');
  if (oldScript) oldScript.remove();
  
  window.initMapCallback = function() { initMap(); };
  
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&callback=initMapCallback`;
  script.async = true;
  script.onerror = () => showNotif('Erro ao carregar mapa', 'error');
  document.head.appendChild(script);
}

function initMap() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  
  map = new google.maps.Map(document.getElementById('google-map'), {
    zoom: 12,
    center: { lat: -23.5505, lng: -46.6333 },
    mapTypeControl: true
  });
  geocoder = new google.maps.Geocoder();
  placesService = new google.maps.places.PlacesService(map);
  
  loadMarkersOnMap();
  updateDashboard();
  updateCompetitorsList();
  setupEventListeners();
  showNotif('✅ Mapa carregado! Faça uma busca.', 'success');
}

// ========== FIRESTORE ==========
async function loadCompaniesFromFirestore() {
  try {
    const querySnapshot = await window.getDocs(window.collection(window.db, 'companies'));
    companiesList = [];
    querySnapshot.forEach(doc => {
      companiesList.push({ id: doc.id, ...doc.data() });
    });
    console.log('Empresas carregadas:', companiesList.length);
  } catch (error) {
    console.error('Erro:', error);
    companiesList = [];
  }
}

async function saveCompanyToFirestore(company) {
  try {
    if (company.id) {
      await window.updateDoc(window.doc(window.db, 'companies', company.id), company);
    } else {
      company.id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
      await window.setDoc(window.doc(window.db, 'companies', company.id), company);
    }
    await loadCompaniesFromFirestore();
    loadMarkersOnMap();
    updateDashboard();
    updateCompetitorsList();
    showNotif('✅ Empresa salva!', 'success');
  } catch (error) {
    console.error(error);
    showNotif('Erro ao salvar', 'error');
  }
}

// ========== EXTRAIR ESTADO E CIDADE ==========
function extractStateAndCity(address) {
  if (!address) return { state: 'N/I', city: 'N/I', stateName: 'Não identificado' };
  
  // Extrair estado (UF)
  const stateMatch = address.match(/([A-Z]{2})(?=\s|$|,)/);
  let state = stateMatch ? stateMatch[1] : 'N/I';
  let city = 'N/I';
  
  // Tentar extrair cidade
  const cityMatch = address.match(/([A-Za-zÀ-ÖØ-öø-ÿ\s]+?)\s*-\s*[A-Z]{2}/);
  if (cityMatch) {
    city = cityMatch[1].trim();
  } else {
    const parts = address.split(',');
    if (parts.length >= 2) {
      let possibleCity = parts[0].trim();
      possibleCity = possibleCity.replace(/^\d+/, '').replace(/Rua|Av|Avenida|Travessa|Alameda|Rodovia/i, '').trim();
      if (possibleCity.length > 2 && possibleCity.length < 40) {
        city = possibleCity;
      }
    }
  }
  
  return { state, city, stateName: stateNames[state] || state };
}

// ========== DASHBOARD DE MARKET SHARE COMPETITIVO ==========
function updateDashboard() {
  const container = document.getElementById('dashboard-container');
  if (!container) return;
  
  // Separar clientes e concorrentes
  const clients = companiesList.filter(c => c.type === 'customer');
  const competitors = companiesList.filter(c => c.type === 'competitor');
  const totalMapped = companiesList.length;
  
  // Totais gerais
  const totalClients = clients.length;
  const totalCompetitors = competitors.length;
  const overallShare = totalMapped > 0 ? ((totalClients / totalMapped) * 100).toFixed(1) : 0;
  const competitorShare = totalMapped > 0 ? ((totalCompetitors / totalMapped) * 100).toFixed(1) : 0;
  
  // Estatísticas por ESTADO
  const stateStats = {};
  
  // Clientes por estado
  clients.forEach(c => {
    const { state, stateName, city } = extractStateAndCity(c.address);
    if (!stateStats[state]) {
      stateStats[state] = { stateName, clients: 0, competitors: 0, total: 0, cities: {} };
    }
    stateStats[state].clients++;
    stateStats[state].total++;
    
    // Por cidade dentro do estado
    if (city !== 'N/I') {
      if (!stateStats[state].cities[city]) {
        stateStats[state].cities[city] = { clients: 0, competitors: 0 };
      }
      stateStats[state].cities[city].clients++;
    }
  });
  
  // Concorrentes por estado
  competitors.forEach(c => {
    const { state, stateName, city } = extractStateAndCity(c.address);
    if (!stateStats[state]) {
      stateStats[state] = { stateName, clients: 0, competitors: 0, total: 0, cities: {} };
    }
    stateStats[state].competitors++;
    stateStats[state].total++;
    
    if (city !== 'N/I') {
      if (!stateStats[state].cities[city]) {
        stateStats[state].cities[city] = { clients: 0, competitors: 0 };
      }
      stateStats[state].cities[city].competitors++;
    }
  });
  
  // Gerar HTML do Dashboard
  let html = `
    <!-- Cards Resumo -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${totalClients}</div><div>✅ Clientes</div></div>
      <div class="stat-card"><div class="stat-number">${totalCompetitors}</div><div>⚠️ Concorrentes</div></div>
      <div class="stat-card"><div class="stat-number">${totalMapped}</div><div>🏢 Total Mapeado</div></div>
    </div>
    
    <!-- Market Share Geral -->
    <div class="competition-card">
      <div class="competition-header">
        <div class="competition-title">📊 Market Share GERAL</div>
        <div class="competition-stats">
          <span class="our-share">✓ Nossa empresa: ${overallShare}%</span>
          <span class="competitor-share">⚠️ Concorrentes: ${competitorShare}%</span>
        </div>
      </div>
      <div class="double-bar">
        <div class="bar-our" style="width: ${overallShare}%">${overallShare}%</div>
        <div class="bar-competitor" style="width: ${competitorShare}%">${competitorShare}%</div>
      </div>
      <div style="font-size: 12px; color: #64748b; margin-top: 8px;">Base: ${totalMapped} empresas mapeadas (clientes + concorrentes)</div>
    </div>
  `;
  
  // Market Share por ESTADO
  const sortedStates = Object.entries(stateStats).sort((a, b) => b[1].total - a[1].total);
  
  html += `<div class="competition-card"><div class="competition-title">📍 Market Share por ESTADO</div>`;
  
  for (const [stateCode, data] of sortedStates) {
    const ourPercent = data.total > 0 ? ((data.clients / data.total) * 100).toFixed(1) : 0;
    const theirPercent = data.total > 0 ? ((data.competitors / data.total) * 100).toFixed(1) : 0;
    const winStatus = ourPercent > theirPercent ? 'win' : (ourPercent < theirPercent ? 'lose' : 'tie');
    
    html += `
      <div style="margin-top: 16px; padding: 12px; background: #111520; border-radius: 10px;">
        <div class="competition-header">
          <div><strong>${data.stateName} (${stateCode})</strong></div>
          <div class="competition-stats">
            <span class="our-share">✓ ${ourPercent}% (${data.clients})</span>
            <span class="competitor-share">⚠️ ${theirPercent}% (${data.competitors})</span>
            ${winStatus === 'win' ? '<span class="win-badge">🏆 Lideramos</span>' : (winStatus === 'lose' ? '<span class="lose-badge">⚠️ Liderado por concorrentes</span>' : '<span class="tie-badge">⚖️ Empate</span>')}
          </div>
        </div>
        <div class="double-bar">
          <div class="bar-our" style="width: ${ourPercent}%">${ourPercent}%</div>
          <div class="bar-competitor" style="width: ${theirPercent}%">${theirPercent}%</div>
        </div>
  `;
    
    // CIDADES dentro do estado
    if (Object.keys(data.cities).length > 0) {
      const sortedCities = Object.entries(data.cities).sort((a, b) => (b[1].clients + b[1].competitors) - (a[1].clients + a[1].competitors));
      html += `<div style="margin-top: 12px;"><div style="font-size: 12px; color: #64748b; margin-bottom: 8px;">📌 Cidades neste estado:</div>`;
      
      for (const [city, cityData] of sortedCities.slice(0, 5)) {
        const cityTotal = cityData.clients + cityData.competitors;
        const cityOurPercent = cityTotal > 0 ? ((cityData.clients / cityTotal) * 100).toFixed(1) : 0;
        const cityTheirPercent = cityTotal > 0 ? ((cityData.competitors / cityTotal) * 100).toFixed(1) : 0;
        
        html += `
          <div style="margin-bottom: 8px; padding-left: 8px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px;">
              <span>🏙️ ${city}</span>
              <span><span style="color: #22c55e;">✓ ${cityOurPercent}%</span> vs <span style="color: #ef4444;">⚠️ ${cityTheirPercent}%</span></span>
            </div>
            <div class="double-bar" style="height: 20px;">
              <div class="bar-our" style="width: ${cityOurPercent}%; font-size: 9px;">${cityOurPercent}%</div>
              <div class="bar-competitor" style="width: ${cityTheirPercent}%; font-size: 9px;">${cityTheirPercent}%</div>
            </div>
          </div>
        `;
      }
      
      if (Object.keys(data.cities).length > 5) {
        html += `<div style="font-size: 11px; color: #64748b; padding-left: 8px;">... e mais ${Object.keys(data.cities).length - 5} cidades</div>`;
      }
      html += `</div>`;
    }
    
    html += `</div>`;
  }
  
  // Se não há dados
  if (sortedStates.length === 0) {
    html += `<div class="competition-card"><div style="text-align: center; color: #64748b; padding: 20px;">Nenhum dado de cliente ou concorrente cadastrado ainda.<br>Adicione empresas pelo mapa para ver o Market Share.</div></div>`;
  }
  
  container.innerHTML = html;
}

// ========== MAPA ==========
function loadMarkersOnMap() {
  clearMarkers();
  if (!map) return;
  
  companiesList.forEach(company => {
    if (company.lat && company.lng) {
      let color = '#6b7280';
      if (company.type === 'customer') color = '#22c55e';
      else if (company.type === 'exclient') color = '#f59e0b';
      else if (company.type === 'competitor') color = '#ef4444';
      else if (company.isVisited) color = '#a855f7';
      
      const marker = new google.maps.Marker({
        position: { lat: company.lat, lng: company.lng },
        map: map,
        title: company.name,
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeWeight: 0, scale: 8 }
      });
      marker.addListener('click', () => openCompanyModal(company));
      markers.push(marker);
    }
  });
}

function displaySearchResults(results) {
  const listDiv = document.getElementById('company-list');
  listDiv.innerHTML = '';
  
  results.forEach(place => {
    if (!place.place_id) return;
    const existing = companiesList.find(c => c.placeId === place.place_id);
    let cardClass = 'company-card';
    let statusTag = '';
    
    if (existing) {
      if (existing.type === 'customer') { cardClass += ' client'; statusTag = '<span class="tag tag-client">Cliente</span>'; }
      else if (existing.type === 'exclient') { cardClass += ' exclient'; statusTag = '<span class="tag tag-exclient">Ex-Cliente</span>'; }
      else if (existing.type === 'competitor') { cardClass += ' competitor'; statusTag = '<span class="tag tag-competitor">Concorrente</span>'; }
      if (existing.isVisited) statusTag += '<span class="tag tag-visited">Visitada</span>';
      if (existing.system && existing.type !== 'competitor') statusTag += `<span class="tag tag-system">${existing.system}</span>`;
    } else {
      statusTag = '<span class="tag">Não cadastrada</span>';
    }
    
    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      <div class="company-name">${place.name}</div>
      <div class="company-addr">${place.formatted_address || place.vicinity || ''}</div>
      <div class="company-tags">${statusTag}</div>
    `;
    card.onclick = () => openCompanyModalFromPlace(place);
    listDiv.appendChild(card);
    
    if (place.geometry && place.geometry.location) {
      let color = '#6b7280';
      if (existing) {
        if (existing.type === 'customer') color = '#22c55e';
        else if (existing.type === 'exclient') color = '#f59e0b';
        else if (existing.type === 'competitor') color = '#ef4444';
        else if (existing.isVisited) color = '#a855f7';
      }
      const marker = new google.maps.Marker({
        position: place.geometry.location,
        map: map,
        title: place.name,
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeWeight: 0, scale: 8 }
      });
      marker.addListener('click', () => openCompanyModalFromPlace(place));
      markers.push(marker);
    }
  });
}

async function searchBusinesses() {
  const searchType = document.querySelector('input[name="searchType"]:checked').value;
  let query = searchType === 'location' ? document.getElementById('search-input').value.trim() : document.getElementById('company-name-input').value.trim();
  if (!query) { showNotif('Digite algo para buscar', 'error'); return; }
  
  clearMarkers();
  showNotif('Buscando...', 'info');
  
  if (searchType === 'company') {
    placesService.textSearch({ query, fields: ['name', 'formatted_address', 'geometry', 'place_id'], language: 'pt-BR' }, (res, status) => {
      if (status === 'OK' && res.length) {
        displaySearchResults(res);
        if (res[0].geometry) map.setCenter(res[0].geometry.location);
        map.setZoom(16);
      } else { showNotif('Nenhuma empresa encontrada', 'error'); }
    });
  } else {
    geocoder.geocode({ address: query + ', Brasil' }, (res, status) => {
      if (status === 'OK' && res[0]) {
        const loc = res[0].geometry.location;
        map.setCenter(loc);
        map.setZoom(14);
        placesService.nearbySearch({ location: loc, radius: 2000, type: 'establishment' }, (res2, status2) => {
          if (status2 === 'OK' && res2.length) displaySearchResults(res2);
          else showNotif('Nenhuma empresa encontrada', 'error');
        });
      } else { showNotif('Local não encontrado', 'error'); }
    });
  }
}

// ========== MODAL ==========
function openCompanyModalFromPlace(place) {
  currentPlace = place;
  const existing = companiesList.find(c => c.placeId === place.place_id);
  
  document.getElementById('modal-name').value = place.name || '';
  document.getElementById('modal-address').value = place.formatted_address || place.vicinity || '';
  
  const type = existing?.type || 'other';
  document.querySelectorAll('input[name="companyType"]').forEach(radio => {
    radio.checked = radio.value === type;
  });
  
  document.getElementById('modal-is-visited').checked = existing?.isVisited || false;
  document.getElementById('modal-system').value = existing?.system || '';
  document.getElementById('modal-counter').value = existing?.counter || '';
  document.getElementById('modal-competitor-name').value = existing?.competitorName || '';
  document.getElementById('modal-competitor-notes').value = existing?.competitorNotes || '';
  
  toggleFieldsByType(type);
  document.getElementById('modal-overlay').classList.add('open');
}

function openCompanyModal(company) {
  currentPlace = null;
  document.getElementById('modal-name').value = company.name || '';
  document.getElementById('modal-address').value = company.address || '';
  
  const type = company.type || 'other';
  document.querySelectorAll('input[name="companyType"]').forEach(radio => {
    radio.checked = radio.value === type;
  });
  
  document.getElementById('modal-is-visited').checked = company.isVisited || false;
  document.getElementById('modal-system').value = company.system || '';
  document.getElementById('modal-counter').value = company.counter || '';
  document.getElementById('modal-competitor-name').value = company.competitorName || '';
  document.getElementById('modal-competitor-notes').value = company.competitorNotes || '';
  
  window.currentEditCompany = company;
  toggleFieldsByType(type);
  document.getElementById('modal-overlay').classList.add('open');
}

function toggleFieldsByType(type) {
  const clientFields = document.getElementById('client-fields');
  const competitorFields = document.getElementById('competitor-fields');
  
  if (type === 'customer' || type === 'exclient') {
    clientFields.style.display = 'block';
    competitorFields.style.display = 'none';
  } else if (type === 'competitor') {
    clientFields.style.display = 'none';
    competitorFields.style.display = 'block';
  } else {
    clientFields.style.display = 'none';
    competitorFields.style.display = 'none';
  }
}

document.querySelectorAll('input[name="companyType"]').forEach(radio => {
  radio.addEventListener('change', (e) => { toggleFieldsByType(e.target.value); });
});

async function saveCompany() {
  const selectedType = document.querySelector('input[name="companyType"]:checked')?.value || 'other';
  const isVisited = document.getElementById('modal-is-visited').checked;
  
  let companyData = {};
  
  if (currentPlace) {
    companyData = {
      placeId: currentPlace.place_id,
      name: document.getElementById('modal-name').value,
      address: document.getElementById('modal-address').value,
      lat: currentPlace.geometry?.location?.lat() || 0,
      lng: currentPlace.geometry?.location?.lng() || 0,
      type: selectedType,
      isVisited: isVisited,
      updatedAt: new Date().toISOString()
    };
    
    if (selectedType === 'customer' || selectedType === 'exclient') {
      companyData.system = document.getElementById('modal-system').value.trim();
      companyData.counter = document.getElementById('modal-counter').value.trim();
      if (!companyData.system) { showNotif('Informe o sistema', 'error'); return; }
      if (!companyData.counter) { showNotif('Informe o contador', 'error'); return; }
    }
    
    if (selectedType === 'competitor') {
      companyData.competitorName = document.getElementById('modal-competitor-name').value.trim();
      companyData.competitorNotes = document.getElementById('modal-competitor-notes').value.trim();
      if (!companyData.competitorName) { showNotif('Informe o nome do concorrente', 'error'); return; }
    }
    
  } else if (window.currentEditCompany) {
    companyData = { ...window.currentEditCompany };
    companyData.type = selectedType;
    companyData.isVisited = isVisited;
    companyData.updatedAt = new Date().toISOString();
    
    if (selectedType === 'customer' || selectedType === 'exclient') {
      companyData.system = document.getElementById('modal-system').value.trim();
      companyData.counter = document.getElementById('modal-counter').value.trim();
      if (!companyData.system) { showNotif('Informe o sistema', 'error'); return; }
      if (!companyData.counter) { showNotif('Informe o contador', 'error'); return; }
      companyData.competitorName = null;
      companyData.competitorNotes = null;
    } else if (selectedType === 'competitor') {
      companyData.competitorName = document.getElementById('modal-competitor-name').value.trim();
      companyData.competitorNotes = document.getElementById('modal-competitor-notes').value.trim();
      if (!companyData.competitorName) { showNotif('Informe o nome do concorrente', 'error'); return; }
      companyData.system = null;
      companyData.counter = null;
    } else {
      companyData.system = null;
      companyData.counter = null;
      companyData.competitorName = null;
      companyData.competitorNotes = null;
    }
  }
  
  await saveCompanyToFirestore(companyData);
  closeModal();
}

// ========== LISTA DE CONCORRENTES ==========
function updateCompetitorsList() {
  const container = document.getElementById('competitors-container');
  if (!container) return;
  
  const competitors = companiesList.filter(c => c.type === 'competitor');
  
  if (competitors.length === 0) {
    container.innerHTML = '<div class="competition-card"><div style="text-align:center;color:#64748b">Nenhum concorrente mapeado ainda</div></div>';
    return;
  }
  
  let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-number">${competitors.length}</div><div>Concorrentes Mapeados</div></div></div>`;
  
  html += `<div class="competition-card"><div style="font-weight:bold; margin-bottom:12px">⚠️ Lista de Concorrentes</div>`;
  competitors.forEach(comp => {
    const { stateName, city } = extractStateAndCity(comp.address);
    html += `
      <div style="border-bottom:1px solid #2d3a5e; padding:12px 0; cursor:pointer" onclick='openCompanyModalFromPlace({place_id:"${comp.placeId}", name:"${comp.name.replace(/'/g, "\\'")}", formatted_address:"${(comp.address || '').replace(/'/g, "\\'")}", geometry:{location:{lat:()=>${comp.lat},lng:()=>${comp.lng}}}})'>
        <div style="font-weight:600">🏆 ${comp.name}</div>
        <div style="font-size:12px;color:#64748b">${comp.address || 'Endereço não informado'}</div>
        <div style="font-size:12px;color:#94a3b8; margin-top:4px">📍 ${city !== 'N/I' ? city + ', ' : ''}${stateName}</div>
        ${comp.competitorName ? `<div style="font-size:12px;color:#ef4444;margin-top:4px">📌 Identificado como: ${comp.competitorName}</div>` : ''}
        ${comp.competitorNotes ? `<div style="font-size:11px;color:#a855f7;margin-top:4px">📝 ${comp.competitorNotes}</div>` : ''}
        ${comp.isVisited ? `<div style="font-size:11px;color:#a855f7;margin-top:4px">✅ Já visitado/pesquisado</div>` : ''}
      </div>
    `;
  });
  html += `</div>`;
  
  container.innerHTML = html;
}

// ========== ADMIN PANEL ==========
async function loadAdminPanel() {
  const panel = document.getElementById('admin-panel');
  if (!panel) return;
  
  try {
    const usersSnapshot = await window.getDocs(window.collection(window.db, 'users'));
    let usersHtml = '<div class="competition-card"><div style="font-weight:bold">👥 Usuários do Sistema</div><table style="width:100%;margin-top:10px"><tr><th>Email</th><th>Função</th><th>Ações</th></tr>';
    usersSnapshot.forEach(doc => {
      const user = doc.data();
      usersHtml += `<tr><td>${user.email}</td><td><select id="role-${doc.id}" class="field-input" style="width:120px;padding:4px"><option ${user.role==='diretor'?'selected':''}>diretor</option><option ${user.role==='gerente'?'selected':''}>gerente</option><option ${user.role==='consultor'?'selected':''}>consultor</option></select></td><td><button class="btn-sm" onclick="updateUserRole('${doc.id}')">Salvar</button></td></tr>`;
    });
    usersHtml += '</table></div>';
    
    usersHtml += `<div class="competition-card" style="margin-top:1rem"><div style="font-weight:bold">➕ Adicionar Usuário</div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><input type="email" id="new-user-email" placeholder="Email" class="field-input" style="flex:1"><input type="password" id="new-user-pass" placeholder="Senha" class="field-input" style="flex:1"><select id="new-user-role" class="field-input" style="width:100px"><option>consultor</option><option>gerente</option><option>diretor</option></select><button class="btn-primary" onclick="createNewUser()">Criar</button></div></div>`;
    
    panel.innerHTML = usersHtml;
  } catch (error) {
    panel.innerHTML = '<div class="competition-card">Erro ao carregar usuários</div>';
  }
}

window.updateUserRole = async function(userId) {
  const newRole = document.getElementById(`role-${userId}`).value;
  try {
    await window.updateDoc(window.doc(window.db, 'users', userId), { role: newRole });
    showNotif('Função atualizada!', 'success');
  } catch (error) {
    showNotif('Erro ao atualizar', 'error');
  }
};

window.createNewUser = async function() {
  const email = document.getElementById('new-user-email').value;
  const pass = document.getElementById('new-user-pass').value;
  const role = document.getElementById('new-user-role').value;
  if (!email || !pass) { showNotif('Preencha email e senha', 'error'); return; }
  
  try {
    const userCred = await window.createUserWithEmailAndPassword(window.auth, email, pass);
    await window.setDoc(window.doc(window.db, 'users', userCred.user.uid), { email, role });
    showNotif('Usuário criado!', 'success');
    loadAdminPanel();
  } catch (error) {
    showNotif('Erro: ' + error.message, 'error');
  }
};

// ========== UTILITÁRIOS ==========
function clearMarkers() { markers.forEach(m => m.setMap(null)); markers = []; }
function filterByStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.map-controls .btn-sm').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const cards = document.querySelectorAll('.company-card');
  cards.forEach(card => {
    const tags = card.querySelector('.company-tags')?.innerHTML || '';
    if (status === 'all') card.style.display = 'block';
    else if (status === 'customer' && tags.includes('Cliente')) card.style.display = 'block';
    else if (status === 'exclient' && tags.includes('Ex-Cliente')) card.style.display = 'block';
    else if (status === 'competitor' && tags.includes('Concorrente')) card.style.display = 'block';
    else if (status === 'visited' && tags.includes('Visitada')) card.style.display = 'block';
    else card.style.display = 'none';
  });
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); currentPlace = null; window.currentEditCompany = null; }
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tab + '-tab').classList.add('active');
  if (tab === 'dashboard') updateDashboard();
  if (tab === 'competitors') updateCompetitorsList();
  if (tab === 'admin' && currentUserRole === 'diretor') loadAdminPanel();
}
function doLogout() { window.signOut(window.auth); location.reload(); }
function setupEventListeners() {
  const rloc = document.querySelector('input[value="location"]');
  const rcomp = document.querySelector('input[value="company"]');
  const sinp = document.getElementById('search-input');
  const cinp = document.getElementById('company-name-input');
  if (rloc && rcomp) {
    rloc.onchange = () => { sinp.style.display = 'block'; cinp.style.display = 'none'; };
    rcomp.onchange = () => { sinp.style.display = 'none'; cinp.style.display = 'block'; };
  }
  document.getElementById('search-input')?.addEventListener('keypress', e => { if (e.key === 'Enter') searchBusinesses(); });
  document.getElementById('company-name-input')?.addEventListener('keypress', e => { if (e.key === 'Enter') searchBusinesses(); });
}

// Verificar sessão
window.onAuthStateChanged(window.auth, (user) => {
  if (user && document.getElementById('screen-app').classList.contains('active')) return;
  if (user) {
    currentUser = user;
    loadCompaniesFromFirestore().then(() => { loadGoogleMaps(); });
  }
});
